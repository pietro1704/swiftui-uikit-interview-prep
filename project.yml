name: SwiftUIInterview
options:
  bundleIdPrefix: com.pietro
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.17.0
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
targets:
  SwiftUIInterview:
    type: application
    platform: iOS
    sources:
      - path: SwiftUIInterview
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pietro.SwiftUIInterview
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: "YES"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "YES"
        DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "NO"
      configs:
        Debug:
          EMIT_FRONTEND_COMMAND_LINES: "YES"
  SwiftUIInterviewTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SwiftUIInterviewTests
    dependencies:
      - target: SwiftUIInterview
      - package: SnapshotTesting
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SwiftUIInterview.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/SwiftUIInterview"
